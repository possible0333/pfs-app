<style>
:root{

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:linear-gradient(180deg,#eef3ff,#f7f8fc);color:var(--text)}
button,input,select,textarea{font:inherit}

button{cursor:pointer;border:none}
.hidden{display:none!important}
.screen{display:none}.screen.active{display:block}
.shell{max-width:460px;margin:0 auto;min-height:100vh;background:rgba(255,255,255,.86);backdrop-filter:blur(10px);box-shadow:0 0 0 1px rgba(255,255,255,.6)}

.empty{padding:18px;border-radius:18px;background:#fafbff;border:1px dashed #d2d9e8;color:var(--muted);text-align:center;font-size:12px}
.table-week{display:grid;gap:8px}.week-row{padding:12px;border:1px solid var(--line);border-radius:16px;background:#fff}.week-row h4{font-size:13px;font-weight:900;margin-bottom:8px}.week-cols{display:grid;grid-template-columns:86px 1fr;gap:8px;font-size:11px}.week-cols div{padding:6px 8px;border-radius:10px;background:#f8faff;border:1px solid #edf1f8}

  const targetTitle = '打合せ';
  const targetNote = meeting.note || '';
  const existing = arr.find(x => x.linkedMeetingId===meeting.id || (x.title===targetTitle && x.date===meeting.date && (x.autoMeeting||x.linkedMeetingId)));
  if(existing){ existing.date = meeting.date; existing.title = targetTitle; existing.time = existing.time || ''; existing.note = targetNote; existing.autoMeeting = true; existing.linkedMeetingId = meeting.id; }
  else { arr.unshift({id:'sm'+Date.now()+Math.floor(Math.random()*1000), date:meeting.date, time:'', title:targetTitle, note:targetNote, autoMeeting:true, linkedMeetingId:meeting.id}); }
  touch(uid,'schedule');
}
function removeMeetingSchedule(uid, meetingId){
  S.schedules[uid] = scheduleList(uid).filter(x => x.linkedMeetingId !== meetingId);
  touch(uid,'schedule');
}

function deadlineHtml(d){
  if(!d) return '<span class="badge gray">期限未設定</span>';
  const diff = daysSince(d);
  const tone = diff < 0 ? 'ok' : diff <= 3 ? 'bad' : 'warn';
  const label = diff < 0 ? `期限 ${dateJp(d)}` : diff === 0 ? `今日 ${dateJp(d)}` : `あと${diff}日 ${dateJp(d)}`;
  return `<span class="badge ${tone}">${label}</span>`;
}
function escapeHtml(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function monthDaysLeft(){ const n=new Date(); return new Date(n.getFullYear(),n.getMonth()+1,0).getDate()-n.getDate(); }
function pvRemaining(uid){ const u=userById(uid); const goal=Number(u?.goalTotalPV||0); return Math.max(0, goal - Number(u?.actualAwardPV||0)); }
function perDayNeed(uid){ const left=Math.max(1,monthDaysLeft()); return Math.ceil(pvRemaining(uid)/left); }
function lastDateLabel(v){ return v ? String(v).slice(0,10).replace(/-/g,'/') : '未更新'; }
function prospectDueSoonCount(uid, days=7){ const t=new Date(todayStr()+'T00:00:00'); return prospectList(uid).filter(p=>{ const d=p.nextActionDue||''; if(!d) return false; const diff=(new Date(d+'T00:00:00')-t)/86400000; return diff>=0 && diff<=days; }).length; }
function sponsorName(uid){ const u=userById(uid); const p=u && u.parentId ? userById(u.parentId) : null; return p ? p.nick : '自分'; }
function lineageLabel(rootId, uid){ const d=depthFrom(rootId, uid); return d===1 ? '直ダウン' : `配下${d}段`; }
function todoTemplates(uid){ return S.todoTemplates[uid] || []; }
function addTodoTemplate(uid,title){ if(!title) return; S.todoTemplates[uid] ||= []; if(!S.todoTemplates[uid].includes(title)) S.todoTemplates[uid].unshift(title); S.todoTemplates[uid]=S.todoTemplates[uid].slice(0,30); }
function projectedGroupUp(uid){ return descendantsOf(uid).reduce((a,u)=>a+Number(u.actualFrontUp||u.actualMemberUp||0),0); }
function dueTodayLinked(uid){
  const t=todayStr();
  const prospects=prospectList(uid).filter(p=>p.nextActionDue===t).map(p=>({id:'auto_p_'+p.id,title:`${p.name}：${p.nextAction||'次アクション'}`,due:p.nextActionDue,source:'プロスペ',status:'todo',auto:true}));

// ダウンライン全員の実績PV合計（再帰）
// [Fix v32] LOSデータがあればその値（グループ全体の合計済みPV）を返し、なければアプリ内の値を使う
// アプリ未登録のダウンラインPVも含めるため、LOS_ROWSのactualPVを優先参照する
function groupActualPV(uid){
  return sum(losDescendantsOf(uid), x=>actualPv(String(x.id)));
}
function groupActualPVIncludingSelf(uid){
  return actualPv(uid) + groupActualPV(uid);
}

// ダウンライン全員の計画PV合計（再帰）
function groupPlanPV(uid){
  const rows = losDescendantsOf(uid);
  return sum(rows, x => manualTotalPV(String(x.id)) + projectedProspectPV(String(x.id),false) + projectedProspectPV(String(x.id),true));
}
function groupPlanPVIncludingSelf(uid){
  const rows = [losRow(uid), ...losDescendantsOf(uid)].filter(Boolean);
  return sum(rows, x => manualTotalPV(String(x.id)) + projectedProspectPV(String(x.id),false) + projectedProspectPV(String(x.id),true));
}

// アップライン表示用：ダウンライン1件ずつのエントリ（直属ダウンのグループ単位）
function linkedDownlineEntries(uid){
  const directKids = S.users.filter(u=>u.parentId===uid);
  const entries = directKids.map(u=>{
    const kidDescendants = [u, ...descendantsOf(u.id)];
    const totalActual = sum(kidDescendants, x=>actualPv(String(x.id)));
    const totalPlan   = sum(kidDescendants, x=>projectedOwnPlanPV(x.id));
    const totalCons   = sum(kidDescendants, x=>manualConsumablePV(x.id));
    const totalLarge  = sum(kidDescendants, x=>manualLargePV(x.id));
    const totalProsp  = sum(kidDescendants, x=>projectedProspectPV(x.id,false)+projectedProspectPV(x.id,true));
    return {
      id:'auto_'+u.id, name:u.nick,
      due:'', action:'グループ計',
      consumablePV:totalCons, largePV:totalLarge,
      targetPV:totalPlan, prospPV:totalProsp,
      actualPV:totalActual, note:'ダウンライン入力から自動反映',
      memberId:u.id, memberCount:kidDescendants.length
    };
  }).filter(x=>x.targetPV>0||x.actualPV>0);
  return entries;
}

// 自分＋グループ全体の計画PV合計（アップラインのPV計画集計に使う）
function projectedTotalPV(user){
  return projectedOwnPlanPV(user.id) + groupPlanPV(user.id);
}

// 旧API互換
function projectedOwnPV(uid){ return projectedOwnPlanPV(uid); }
function scoreUser(uid){
  const u = userById(uid); let s = 2;
  ['meeting','schedule','pv','prospect','todo'].forEach(a=>{ const d=daysSince(lastUpdate(uid,a)); if(d===0) s += 1.5; else if(d<3) s += 1; else if(d<7) s += 0.4; else s -= 0.3; });
  const prog = u.goalTotalPV ? Math.min(1, (actualPv(u.id)+projectedTotalPV(u))/Number(u.goalTotalPV||1)) : 0;
  s += prog*2.5;
  const grpGoal = Number(u.goalGroupUp||0), frontGoal = Number(u.goalFrontUp||u.goalMemberUp||0);
  const upProg = (frontGoal?Math.min(1,Number(u.actualFrontUp||u.actualMemberUp||0)/frontGoal):0) + (grpGoal?Math.min(1,projectedGroupUp(uid)/grpGoal):0);
  s += Math.min(2,upProg);
  return Math.max(1,Math.min(10,Math.round(s)));
}
function faceByScore(n){
  const faces = ['😵','😢','☹️','🙁','😐','🙂','😊','😄','😁','🤩','🥳'];
  return faces[Math.max(0,Math.min(10,Math.round(n/10)))];
}
function monthProgressScore(uid){
  const u=userById(uid);
  const goal=Number(u.goalTotalPV||0); if(!goal) return 0;
  const now=new Date(); const day=now.getDate(); const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const expected=day/dim; const actual=Math.min(1,(actualPv(uid)+projectedTotalPV(u))/goal);
  const ratio=Math.min(1.25, actual/Math.max(0.08,expected));
  return Math.max(0,Math.min(40, Math.round(40*Math.min(1,ratio))));
}
function prospectScore(uid){
  const list=prospectList(uid).filter(p=>p.grade!=='D');
  const appts=list.filter(p=>p.apptFixed).length;
  const countScore=Math.min(8, list.length*1.3);
  const apptScore=Math.min(12, appts*4);
  return Math.round(countScore+apptScore);
}
function meetingScore(uid){
  const dates=meetingList(uid).map(x=>x.date).filter(Boolean).sort().reverse();
  if(!dates.length) return 0;
  const d=Math.abs(Math.floor((new Date(todayStr())-new Date(dates[0]))/86400000));
  if(d===0) return 19; if(d===1) return 16; if(d<=3) return 12; if(d<=7) return 8; if(d<=14) return 4; return 1;
}
function hundredScore(uid){
  let score=0;
  score += lastLogin(uid) && daysSince(lastLogin(uid))<=1 ? 1 : 0;
  ['meeting','schedule','pv','prospect'].forEach(a=>{ if(lastUpdate(uid,a)&&daysSince(lastUpdate(uid,a))<=1) score += 5; });
  score += monthProgressScore(uid);
  score += prospectScore(uid);
  score += meetingScore(uid);
  return Math.max(0,Math.min(100,Math.round(score)));
}
function sortByDue(list){
  return [...list].sort((a,b)=>{
    const ad = a.nextActionDue || a.due || '9999-12-31';
    const bd = b.nextActionDue || b.due || '9999-12-31';
    return ad.localeCompare(bd);
  });
}

function ymLabel(dateStr){ const d=new Date(dateStr); return `${d.getFullYear()}年${d.getMonth()+1}月`; }
function monthStart(dateStr){ const d=new Date(dateStr); return new Date(d.getFullYear(), d.getMonth(), 1); }
function monthEnd(dateStr){ const d=new Date(dateStr); return new Date(d.getFullYear(), d.getMonth()+1, 0); }
function addMonths(dateStr, delta){ const d=new Date(dateStr); return new Date(d.getFullYear(), d.getMonth()+delta, 1).toISOString().slice(0,10); }
function dateInRange(dateStr,start,end){ if(!dateStr||!start) return false; return dateStr>=start && dateStr<=(end||start); }
function scheduleItemsOnDate(uid,dateStr){
  const items=[];
  scheduleList(uid).filter(x=>x.date===dateStr).forEach(x=>items.push({...x,kind:'schedule'}));
  shiftList(uid).filter(x=>dateInRange(dateStr, x.dateStart||x.date, x.dateEnd||x.date)).forEach(x=>items.push({...x,kind:'shift'}));
  commonSchedules().filter(x=>x.date===dateStr).forEach(x=>items.push({...x,kind:'common'}));
  return items.sort((a,b)=> String(a.time||'').localeCompare(String(b.time||'')));
}
function changeScheduleMonth(delta){ scheduleMonthBase = addMonths(scheduleMonthBase || todayStr(), delta); const start=monthStart(scheduleMonthBase); const end=monthEnd(scheduleMonthBase); if(selectedScheduleDate < start.toISOString().slice(0,10) || selectedScheduleDate > end.toISOString().slice(0,10)) selectedScheduleDate = start.toISOString().slice(0,10); renderApp(); }
function pickScheduleDate(dateStr){ selectedScheduleDate = dateStr; renderApp(); }
function renderScheduleCalendar(uid){
  const base = scheduleMonthBase || todayStr();
  const start = monthStart(base); const end = monthEnd(base);
  const gridStart = startOfWeek(start);
  const cells=[];
  for(let i=0;i<42;i++){
    const d = addDays(gridStart,i); const ds = d.toISOString().slice(0,10); const inMonth = d.getMonth()===start.getMonth();
    const items = inMonth ? scheduleItemsOnDate(uid, ds) : [];
    const itemHtml = items.slice(0,2).map(it=>{
      const cls = it.kind==='common' ? 'common' : it.kind==='shift' ? 'shift' : (it.deadline?'deadline':'');
      const label = it.kind==='shift' ? `勤務 ${it.type||''}` : it.kind==='common' ? `${it.time?it.time+' ':''}${it.title}` : `${it.time?it.time+' ':''}${it.title}`;
      return `<div class="cal-chip ${cls}">${escapeHtml(label.trim())}</div>`;
    }).join('');
    const more = items.length>2 ? `<div class="small">+${items.length-2}件</div>` : '';
    cells.push(`<div class="cal-cell ${inMonth?'':'empty'} ${items.length?'has-items':''} ${ds===selectedScheduleDate?'selected':''} ${ds===todayStr()?'today':''}" ${inMonth?`onclick="pickScheduleDate('${ds}')"`:''}><div class="cal-dayline"><div class="cal-day">${inMonth?d.getDate():''}</div>${items.length?`<div class="cal-count">${items.length}</div>`:''}</div>${itemHtml}${more}</div>`);
  }
  return `<div class="calendar-wrap"><div class="calendar-nav"><div class="row-actions"><button class="btn2" onclick="changeScheduleMonth(-1)">← 前月</button><button class="btn2" onclick="changeScheduleMonth(1)">次月 →</button></div><div class="calendar-title">${ymLabel(base)}</div><button class="btn2" onclick="pickScheduleDate(todayStr());scheduleMonthBase=todayStr().slice(0,7)+'-01';renderApp();">今月</button></div><div class="calendar-legend"><span class="lg-schedule">個人予定</span><span class="lg-shift">勤務</span><span class="lg-common">共通</span><span class="lg-deadline">期限重視</span></div><div class="calendar-grid"><div class="cal-weekday">月</div><div class="cal-weekday">火</div><div class="cal-weekday">水</div><div class="cal-weekday">木</div><div class="cal-weekday">金</div><div class="cal-weekday">土</div><div class="cal-weekday">日</div>${cells.join('')}</div></div>`;
}

function deleteShift(uid,id){ if(!confirm('削除する？')) return; S.shifts[uid]=shiftList(uid).filter(x=>x.id!==id); touch(uid,'schedule'); renderApp(); }

function startOfWeek(d=new Date()){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setHours(0,0,0,0); x.setDate(x.getDate()-day); return x; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function expandShiftDates(s){
  const start = s.dateStart || s.date || '';
  const end = s.dateEnd || s.date || start;
  const out=[]; if(!start) return out;
  let cur=new Date(start+'T00:00:00'); const last=new Date(end+'T00:00:00');
  while(cur<=last){ out.push(cur.toISOString().slice(0,10)); cur.setDate(cur.getDate()+1); }
  return out;
}
function weekRowsHtml(baseDate){
  const start=startOfWeek(baseDate); const users = S.users.filter(u=>u.role!=='leader');
  const headers = Array.from({length:7}, (_,i)=>{ const d=addDays(start,i); return `<div class="hd">${['月','火','水','木','金','土','日'][i]}<br>${d.toISOString().slice(5,10)}</div>`; }).join('');
  const rows = users.map(u=>{
    const cells = Array.from({length:7}, (_,i)=>{
      const ds = addDays(start,i).toISOString().slice(0,10);
      const shifts = shiftList(u.id).filter(x=>expandShiftDates(x).includes(ds)).map(x=>x.type).join(' / ');
      const evts = scheduleList(u.id).filter(x=>x.date===ds).map(x=>`${x.time?x.time+' ':''}${x.title}`).join('<br>');
      const commons = commonSchedules().filter(x=>x.date===ds).map(x=>`★ ${x.time?x.time+' ':''}${x.title}`).join('<br>');
      return `<div class="cell">${shifts?`<div class="sched-shift">${shifts}</div>`:''}${evts?`<div class="sched-evt">${evts}</div>`:''}${commons?`<div class="sched-common">${commons}</div>`:''}${!shifts&&!evts&&!commons?`<span class="muted">-</span>`:''}</div>`;
    }).join('');
    return `<div class="nm">${u.nick}</div>${cells}`;
  }).join('');
  return `<div class="table-wrap"><div class="schedule-table"><div class="hd">メンバー</div>${headers}${rows}</div></div>`;
}

function depthFrom(rootId,targetId){
  let depth=0, cur=userById(targetId);
  const seen=new Set();
  while(cur && cur.parentId && !seen.has(cur.id)){
    seen.add(cur.id);
    depth += 1;
    if(cur.parentId===rootId) return depth;
    cur = userById(cur.parentId);
  }
  return depth || 1;
}


function isPvTreeOpen(rootId,nodeId){ return !!((pvTreeOpen[rootId]||{})[nodeId]); }
function togglePvTree(rootId,nodeId){

  renderApp();
}
function renderLosTree(rootId){

function renderLosTreeNode(rootId,row,depth){
  const kids = losChildrenOf(row.id);
  const isOpen = isPvTreeOpen(rootId,row.id);
  const appUser = userById(String(row.id));
  const sponsor = losName(row.sponsorId);
  const path = losPath(rootId,row.id);
  const pathText = path.length ? `${path.join(' > ')} > ${losName(row.id)}` : `${losName(rootId)} > ${losName(row.id)}`;
  const targetUid = appUser ? String(appUser.id) : String(row.id);
  const planPV = projectedOwnPlanPV(targetUid);
  const goalPV = appUser ? Number(appUser.goalTotalPV||0) : 0;
  const labelMap={1:'フロント',2:'セカンド',3:'サード',4:'フォース'};
  const badge = depth===1 ? `<span class="badge">${labelMap[depth]||'フロント'}</span>` : `<span class="badge gray">${labelMap[depth]||`${depth}段目`}</span>`;
  const chevron = kids.length ? `<span class="tree-chevron">${isOpen?'▾':'▸'}</span>` : `<span class="badge ok">末端</span>`;
  const detail = appUser ? `<button class="btn2" onclick="event.stopPropagation();openMemberPage('${appUser.id}')">詳細</button>` : ``;
  const editBtn = `<button class="btn" onclick="event.stopPropagation();openModal('pvmanual','${targetUid}')">編集</button>`;
  const nameTap = `<div class="item-name">${losName(row.id)} ${badge}</div>`;
  return `
    <div class="item tree-card" style="margin-left:${Math.max(0,(depth-1)*14)}px" ${kids.length?`onclick="togglePvTree('${rootId}','${row.id}')"`:''}>
      <div class="item-top">
        <div>
          ${nameTap}
          <div class="item-sub">スポンサー ${sponsor} / 実績 ${fmt(actualPv(targetUid))}PV / 計画 ${fmt(planPV)}PV ${goalPV?`/ 目標 ${fmt(goalPV)}PV`:''}</div>
          <div class="small">${escapeHtml(pathText)}</div>
        </div>
        <div class="row-actions">${chevron}${editBtn}${detail}</div>
      </div>
    </div>
    ${isOpen ? kids.map(k=>renderLosTreeNode(rootId,k,depth+1)).join('') : ''}
  `;
}

function collectAlerts(){
  const out=[]; const today=todayStr();
  for(const u of S.users.filter(x=>x.role!=='leader')){
    prospectList(u.id).forEach(p=>{ if(p.nextActionDue && p.nextActionDue<=today) out.push({user:u.nick,cat:'プロスペ',title:`${p.name} / ${p.nextAction||'次アクション'}`,due:p.nextActionDue}); });
    pvManual(u.id).forEach(v=>{ if(v.due && v.due<=today) out.push({user:u.nick,cat:'PV計画',title:`${v.name} / ${v.action||'対応'}`,due:v.due}); });
    todoList(u.id).filter(t=>t.status!=='done' && t.due && t.due<=today).forEach(t=> out.push({user:u.nick,cat:'TODO',title:t.title,due:t.due}));
    const upd=[['meeting','打合せ'],['schedule','スケジュール'],['pv','PV計画'],['prospect','プロスペ']];
    upd.forEach(([k,label])=>{ const d=daysSince(lastUpdate(u.id,k)); if(d>=3) out.push({user:u.nick,cat:'更新アラート',title:`${label} ${d}日未更新`,due:''}); });
  }
  return out;
}
function categoryAlertSummary(uid){
  const today=todayStr();
  const prospects = prospectList(uid).filter(p=>p.nextActionDue && p.nextActionDue<=today).length;
  const plans = pvManual(uid).filter(v=>v.due && v.due<=today).length;
  const todos = todoList(uid).filter(t=>t.status!=='done' && t.due && t.due<=today).length;
  const stale = {
    meeting: daysSince(lastUpdate(uid,'meeting')),
    schedule: daysSince(lastUpdate(uid,'schedule')),
    pv: daysSince(lastUpdate(uid,'pv')),
    prospect: daysSince(lastUpdate(uid,'prospect')),
    todo: daysSince(lastUpdate(uid,'todo'))
  };
  return {
    prospect: prospects ? `期限${prospects}件` : (stale.prospect>=7?`${stale.prospect}日未更新`:stale.prospect>=3?`${stale.prospect}日空き`:''),
    pv: plans ? `期限${plans}件` : (stale.pv>=7?`${stale.pv}日未更新`:stale.pv>=3?`${stale.pv}日空き`:''),
    todo: todos ? `期限${todos}件` : (stale.todo>=7?`${stale.todo}日未更新`:stale.todo>=3?`${stale.todo}日空き`:''),
    schedule: stale.schedule>=7?`${stale.schedule}日未更新`:stale.schedule>=3?`${stale.schedule}日空き`:'',
    meeting: stale.meeting>=7?`${stale.meeting}日未更新`:stale.meeting>=3?`${stale.meeting}日空き`:''
  };
}

function exportData(){
  const data = JSON.stringify(S, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const d = new Date().toISOString().slice(0,10);
  a.download = `pfs_backup_${d}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);
      if(!data.users || !Array.isArray(data.users)) throw new Error('不正なフォーマットです');
      // 現在のlocalStorageキーに保存
      localStorage.setItem(STORAGE_KEY, e.target.result);
      document.getElementById('importStatus').textContent = '✅ インポート完了！ページを再読み込みします...';
      document.getElementById('importStatus').style.color = 'var(--ok)';

function importProspectExcel(event){
  const file = event.target.files[0];
  if(!file) return;
  const statusEl = document.getElementById('prospImportStatus');
  statusEl.textContent = '読み込み中...';
  statusEl.style.color = 'var(--muted)';
  
  if(typeof XLSX === 'undefined'){
    statusEl.textContent = '❌ XLSXライブラリが読み込めていません';
    statusEl.style.color = 'var(--bad)';
    return;
  }
  
  const sponsorMap = {
    'カエデ':'142672','マユ':'326158','ヒカリ':'474713','ルナ':'366832',
    'シュウタ':'629910','ユウスケ':'752435','さゆりん':'782955','ヒヨリ':'620503',
    'ハルヒコ':'710176','ハヤテ':'721489','ケンタ':'689241','リュウ':'762617','ハルコ':'9806551'
  };
  
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      // 「プロスぺ管理」シートを探す
      const sheetName = wb.SheetNames.find(n => n.includes('プロスぺ') || n.includes('プロスペ'));
      if(!sheetName) throw new Error('「プロスぺ管理」シートが見つかりません');
      
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      if(rows.length < 2) throw new Error('データが少なすぎます');
      
      // ヘッダー行を探す（スポンサー列がある行）
      let headerRow = -1;
      for(let i=0;i<rows.length;i++){
        if(rows[i].some(c=>String(c).includes('スポンサー'))){headerRow=i;break;}
      }
      if(headerRow<0) throw new Error('ヘッダー行が見つかりません');
      
      const headers = rows[headerRow].map(h=>String(h||''));
      const ciSponsor = headers.findIndex(h=>h.includes('スポンサー'));
      const ciName = headers.findIndex(h=>h.includes('名前'));
      const ciDue = headers.findIndex(h=>h.includes('次アポ') || h.includes('期限'));
      const ciAppt = headers.findIndex(h=>h.includes('アポ確定'));
      const ciAction = headers.findIndex(h=>h.includes('何をする'));
      const ciMemo1 = headers.findIndex(h=>h.includes('進捗'));
      const ciMemo2 = headers.findIndex(h=>h.includes('情報'));
      
      const newProspects = {};
      const counters = {};
      
      for(let i=headerRow+1;i<rows.length;i++){
        const row = rows[i];
        const sponsor = String(row[ciSponsor]||'').trim();
        const name = String(row[ciName]||'').trim();
        
        if(!name || name==='nan' || name==='プロスペ探し') continue;
        
        let uid = null;
        for(const [key,val] of Object.entries(sponsorMap)){
          if(sponsor.includes(key)){uid=val;break;}
        }
        if(!uid) continue;
        
        let dueStr = '';
        const dueRaw = String(row[ciDue]||'').trim();
        if(dueRaw && dueRaw!=='nan'){
          // XLSX日付シリアル値の場合
          const dueNum = Number(row[ciDue]);
          if(!isNaN(dueNum) && dueNum > 40000){
            const d = XLSX.SSF.parse_date_code(dueNum);
            if(d) dueStr = `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
          } else if(dueRaw.includes('/') || dueRaw.includes('-')){
            const parts = dueRaw.split(/[\/\-]/);
            if(parts.length===3) dueStr = `${parts[0]}-${parts[1].padStart(2,'0')}-${parts[2].padStart(2,'0').replace(/^0+$/,'01')}`;
          }
        }
        
        const apptFixed = ['1','1.0','true','TRUE','はい'].includes(String(row[ciAppt]||'').trim());
        const nextAction = String(row[ciAction]||'').trim().replace(/^nan$/,'');
        const memo = [row[ciMemo1],row[ciMemo2],...row.slice(7)].map(v=>String(v||'').trim()).filter(v=>v&&v!=='nan').join(' / ');
        const grade = apptFixed ? 'A' : (dueStr ? 'B' : 'C');
        
        counters[uid] = (counters[uid]||0);
        const pid = 'xl-' + uid + '-' + (counters[uid]++);
        
        if(!newProspects[uid]) newProspects[uid] = [];
        newProspects[uid].push({id:pid,name,category:'プロスペ',grade,expectedPV:0,
          apptFixed,nextAction,nextActionDue:dueStr,memo});
      }
      
      // S.prospectsを更新
      S.prospects = {...S.prospects, ...newProspects};
      // 更新日時を記録
      for(const uid of Object.keys(newProspects)){
        touch(uid,'prospect');
      }
      save();
      
      const total = Object.values(newProspects).reduce((a,v)=>a+v.length,0);
      statusEl.textContent = `✅ ${total}件のプロスペをインポートしました`;
      statusEl.style.color = 'var(--ok)';
      renderApp();
    }catch(err){
      statusEl.textContent = '❌ エラー: ' + err.message;
      statusEl.style.color = 'var(--bad)';
    }
  };
  reader.readAsArrayBuffer(file);
  event.target.value = '';
}

function importExcel(ev){
  const file = ev.target.files && ev.target.files[0];
  if(!file) return;
  if(typeof XLSX === 'undefined'){ alert('Excelライブラリが読み込めていません。手動更新を使ってください。'); return; }

  const normalizeName = (v) => String(v||'').replace(/\s+/g,'').replace(/[・･]/g,'').trim();
  const normalizeId = (v) => String(v||'').replace(/[^0-9]/g,'').trim();
  const parsePv = (v) => {
    const s = String(v ?? '').replace(/,/g,'').trim();
    if(!s) return NaN;
    const n = Number(s);
    return Number.isFinite(n) ? n : NaN;
  };

  const applyRows = (rows) => {
    if(!rows.length) throw new Error('empty');
    const maxScan = Math.min(rows.length, 10);
    let headerRowIndex = -1;
    let aboIdx = -1, nameIdx = -1, pvIdx = -1;

    for(let i=0;i<maxScan;i++){
      const header = (rows[i]||[]).map(x=>String(x||'').trim());
      const idxAbo = header.findIndex(h=>/^(ABO番号|ABO No|ABO)$/i.test(h));
      const idxName = header.findIndex(h=>/^(名前|氏名|Name)$/i.test(h));
      const idxPv = header.findIndex(h=>/(アワードPV|Award PV|PV)/i.test(h));
      if(idxName>=0 && idxPv>=0){
        headerRowIndex = i;
        aboIdx = idxAbo;
        nameIdx = idxName;
        pvIdx = idxPv;
        break;
      }
    }
    if(headerRowIndex < 0 || nameIdx < 0 || pvIdx < 0) throw new Error('columns');

    let matched = 0;
    for(const r of rows.slice(headerRowIndex+1)){
      if(!r || !r.length) continue;
      const aboNo = aboIdx>=0 ? normalizeId(r[aboIdx]) : '';
      const rawName = String(r[nameIdx]||'').trim();
      const name = normalizeName(rawName);
      const pv = parsePv(r[pvIdx]);
      if((!aboNo && !name) || !Number.isFinite(pv)) continue;

      let hit = null;
      if(aboNo) hit = userById(aboNo) || S.users.find(u=>normalizeId(u.id)===aboNo);
      if(!hit && name) hit = S.users.find(u=>normalizeName(u.nick)===name);
      if(hit){
        syncActualPv(hit.id, pv);
        matched++;
      }else if(aboNo && LOS_MAP[aboNo]){
        syncActualPv(aboNo, pv);
        matched++;
      }
    }
    S.actualPVImportedAt = nowIso();
    save();
    renderApp();
    alert(`インポート完了（${matched}件更新）`);
  };

  const lowerName = String(file.name||'').toLowerCase();
  if(lowerName.endsWith('.csv')){
    const reader = new FileReader();
    reader.onload = function(e){
      try{
        const wb = XLSX.read(String(e.target.result||''), {type:'string'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        applyRows(rows);
      }catch(err){
        console.error(err);
        alert('CSVインポートに失敗しました。列名に「ABO番号」「名前」「アワードPV」があるか確認してください。');
      }
    };
    reader.readAsText(file, 'utf-8');
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      applyRows(rows);
    }catch(err){
      console.error(err);
      alert('インポートに失敗しました。列名に「ABO番号」「名前」「アワードPV」があるか確認してください。');
    }
  };
  reader.readAsArrayBuffer(file);
}

    const arr=prospectList(uid); const obj={id:listId||'r'+Date.now(),name:document.getElementById('fName').value.trim(),grade:document.getElementById('fGrade').value,category:document.getElementById('fCat').value,expectedPV:Number(document.getElementById('fPv').value||0),apptFixed:document.getElementById('fAppt').value==='1',nextAction:document.getElementById('fAction').value.trim(),nextActionDue:document.getElementById('fDue').value,memo:document.getElementById('fNote').value.trim()}; if(!obj.name) return alert('名前を入れてください'); const i=arr.findIndex(x=>x.id===obj.id); if(i>-1) arr[i]=obj; else arr.unshift(obj); touch(uid,'prospect');
  }
  if(m.mode==='schedule'){
    const arr=scheduleList(uid); const obj={id:listId||'s'+Date.now(),date:document.getElementById('fDate').value,time:document.getElementById('fTime').value.trim(),title:document.getElementById('fTitle').value.trim(),note:document.getElementById('fNote').value.trim()}; if(!obj.title) return alert('予定名を入れてください'); const i=arr.findIndex(x=>x.id===obj.id); if(i>-1) arr[i]=obj; else arr.unshift(obj); touch(uid,'schedule');
  }
  if(m.mode==='shift'){
    const arr=shiftList(uid); const start=document.getElementById('fDateStart').value, end=document.getElementById('fDateEnd').value||start; if(!start) return alert('開始日を入れてください'); const obj={id:listId||'w'+Date.now(),dateStart:start,dateEnd:end,type:document.getElementById('fType').value,date:start}; const i=arr.findIndex(x=>x.id===obj.id); if(i>-1) arr[i]=obj; else arr.unshift(obj); touch(uid,'schedule');
  }
  if(m.mode==='todo'){
    const arr=todoList(uid); const title=document.getElementById('fTitle').value.trim(); const obj={id:listId||'t'+Date.now(),title,due:document.getElementById('fDue').value,status:'todo'}; if(!obj.title) return alert('タイトルを入れてください'); addTodoTemplate(uid,title); const i=arr.findIndex(x=>x.id===obj.id); if(i>-1) arr[i]={...arr[i],...obj}; else arr.unshift(obj); touch(uid,'todo');
  }
  if(m.mode==='meeting'){
    const arr=meetingList(uid); const obj={id:listId||'m'+Date.now(),date:document.getElementById('fDate').value,note:document.getElementById('fNote').value.trim()}; const i=arr.findIndex(x=>x.id===obj.id); if(i>-1) arr[i]=obj; else arr.unshift(obj); touch(uid,'meeting'); ensureMeetingSchedule(uid,obj);
  }
  if(m.mode==='commonschedule'){
    const arr=commonSchedules(); const obj={id:listId||'cs'+Date.now(),date:document.getElementById('fDate').value,time:document.getElementById('fTime').value.trim(),title:document.getElementById('fTitle').value.trim(),note:document.getElementById('fNote').value.trim()}; if(!obj.title) return alert('タイトルを入れてください'); const i=arr.findIndex(x=>x.id===obj.id); if(i>-1) arr[i]=obj; else arr.unshift(obj);
  }
  if(m.mode==='member'){
    const nick=document.getElementById('fNick').value.trim(), pin=document.getElementById('fPin').value.trim(), parentId=document.getElementById('fParent').value||null; if(!nick||!pin) return alert('名前とPINを入れてください');
    if(uid){ const u=userById(uid); u.nick=nick; u.pin=pin; u.parentId=parentId; }
    else { const id=document.getElementById('fId').value.trim(); if(!id) return alert('IDを入れてください'); if(userById(id)) return alert('IDが重複しています'); S.users.push({id,nick,pin,role:'member',parentId,actualAwardPV:0,goalTotalPV:0,goalConsumablePV:0,goalFrontUp:0,goalGroupUp:0,actualFrontUp:0,actualMemberUp:0}); normalizeState(S); }
    save();
  }
  if(m.mode==='password'){
    const u=userById(uid);
    const current=document.getElementById('fCurrentPin').value.trim();
    const next=document.getElementById('fNewPin').value.trim();
    const next2=document.getElementById('fNewPin2').value.trim();
    if(String(u.pin)!==current) return alert('現在のPINが違います');
    if(!/^\d{4}$/.test(next)) return alert('新しいPINは4桁の数字で入力してください');
    if(next!==next2) return alert('確認用PINが一致しません');
    u.pin=next;
  }
  if(m.mode==='actualpv'){
    syncActualPv(uid, Number(document.getElementById('fPv').value||0)); S.actualPVImportedAt = nowIso(); touch(uid,'pv');
  }
  save(); closeModal(); renderApp();
}

window.openModal=openModal; window.closeModal=closeModal; window.saveModal=saveModal; window.deletePvManual=deletePvManual; window.deleteProspect=deleteProspect; window.deleteSchedule=deleteSchedule; window.deleteShift=deleteShift; window.toggleTodo=toggleTodo; window.deleteTodo=deleteTodo; window.quickMeeting=quickMeeting; window.deleteMeeting=deleteMeeting; window.deleteMember=deleteMember; window.deleteCommonSchedule=deleteCommonSchedule; window.importExcel=importExcel; window.changeWeek=changeWeek; window.pickGroupName=pickGroupName; window.pickLargeProduct=pickLargeProduct; window.recalcPvTotal=recalcPvTotal; window.changeWeekModal=changeWeekModal;

  renderLogin();
  if(S.loggedIn && userById(S.loggedIn)) openApp();
}
